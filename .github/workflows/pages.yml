name: Guard & Deploy website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  guard-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run devguard checks
        run: npx @kevinpatil/devguard --strict
        continue-on-error: true

      - name: Deploy website to Netlify
        run: npx netlify-cli deploy --dir=docs --prod --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}

      - name: Print live URL
        run: echo "✅ Site live at https://kevinpatildxd-devguard.netlify.app"
